<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anglicismos en Redes Sociales</title>

<style>
  :root {
    --bg: #f4f3ff;
    --card: #ffffff;
    --accent: #6366f1;
    --accent2: #818cf8;
    --text: #1e1b4b;
    --muted: #6b7280;
    --tiktok: #fe2c55;
    --instagram: #c13584;
    --whatsapp: #25d366;
    --shadow: 0 2px 16px rgba(99,102,241,0.10);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  header {
    background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 50%, #a855f7 100%);
    color: white;
    padding: 2.5rem 2rem 2rem;
    text-align: center;
  }
  header h1 { font-size: 2rem; font-weight: 800; letter-spacing: -0.02em; margin-bottom: .4rem; }
  header p { font-size: 1rem; opacity: .85; }

  .pills-row {
    display: flex;
    justify-content: center;
    gap: .7rem;
    margin-top: 1.2rem;
    flex-wrap: wrap;
  }
  .pill {
    background: rgba(255,255,255,.18);
    border: 1px solid rgba(255,255,255,.3);
    border-radius: 99px;
    padding: .3rem .9rem;
    font-size: .8rem;
    font-weight: 600;
    letter-spacing: .03em;
  }
  .pill span { font-size: 1rem; font-weight: 800; margin-right: .3rem; }

  main { max-width: 960px; margin: 0 auto; padding: 2rem 1.2rem 4rem; }

  .filters-card {
    background: var(--card);
    border-radius: 16px;
    box-shadow: var(--shadow);
    padding: 1.4rem 1.6rem;
    display: flex;
    flex-wrap: wrap;
    gap: 1.2rem 2rem;
    align-items: flex-end;
    margin-bottom: 1.6rem;
  }
  .filter-group { display: flex; flex-direction: column; gap: .35rem; min-width: 140px; }
  .filter-group label {
    font-size: .72rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .06em;
    color: var(--muted);
  }
  .filter-group select {
    border: 1.5px solid #e0e7ff;
    border-radius: 8px;
    padding: .45rem .7rem;
    font-size: .9rem;
    background: white;
    color: var(--text);
    cursor: pointer;
    transition: border-color .2s;
    outline: none;
  }
  .filter-group select:focus { border-color: var(--accent); }

  .chart-type-group { display: flex; gap: .4rem; }
  .chart-type-group button {
    padding: .45rem .9rem;
    border-radius: 8px;
    border: 1.5px solid #e0e7ff;
    background: white;
    font-size: .85rem;
    font-weight: 600;
    cursor: pointer;
    color: var(--muted);
    transition: all .18s;
    display: flex; align-items: center; gap: .35rem;
  }
  .chart-type-group button:hover { border-color: var(--accent); color: var(--accent); }
  .chart-type-group button.active {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }

  .chart-card {
    background: var(--card);
    border-radius: 16px;
    box-shadow: var(--shadow);
    padding: 1.6rem;
    margin-bottom: 1.6rem;
  }
  .chart-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 1.2rem;
    flex-wrap: wrap;
    gap: .5rem;
  }
  .chart-title { font-size: 1.1rem; font-weight: 700; color: var(--text); }
  .chart-subtitle { font-size: .82rem; color: var(--muted); margin-top: .2rem; }
  .topn-group { display: flex; align-items: center; gap: .5rem; }
  .topn-group label { font-size: .78rem; font-weight: 600; color: var(--muted); white-space: nowrap; }
  .topn-group select {
    border: 1.5px solid #e0e7ff;
    border-radius: 8px;
    padding: .35rem .6rem;
    font-size: .85rem;
    background: white;
    cursor: pointer;
    outline: none;
    transition: border-color .2s;
  }
  .topn-group select:focus { border-color: var(--accent); }

  .chart-wrapper { position: relative; width: 100%; }

  .examples-card {
    background: var(--card);
    border-radius: 16px;
    box-shadow: var(--shadow);
    padding: 1.6rem;
  }
  .examples-header {
    display: flex;
    align-items: center;
    gap: .7rem;
    margin-bottom: 1.2rem;
    flex-wrap: wrap;
  }
  .examples-header h3 { font-size: 1rem; font-weight: 700; }
  .examples-tag {
    background: linear-gradient(135deg, #6366f1, #a855f7);
    color: white;
    border-radius: 99px;
    padding: .25rem .8rem;
    font-size: .85rem;
    font-weight: 700;
  }
  .platform-badge {
    display: inline-block;
    border-radius: 99px;
    padding: .18rem .65rem;
    font-size: .72rem;
    font-weight: 700;
    margin-right: .4rem;
    flex-shrink: 0;
  }
  .badge-TikTok { background: #ffe4e8; color: #be123c; }
  .badge-Instagram { background: #fae8ff; color: #86198f; }
  .badge-WhatsApp { background: #dcfce7; color: #15803d; }

  .examples-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: .7rem;
  }
  .example-item {
    background: #f8f7ff;
    border-radius: 10px;
    padding: .7rem .9rem;
    font-size: .87rem;
    border-left: 3px solid var(--accent2);
    display: flex;
    flex-direction: column;
    gap: .35rem;
  }
  .example-phrase { color: var(--text); font-style: italic; line-height: 1.45; }
  .example-meta { display: flex; align-items: center; }

  .no-examples {
    text-align: center;
    color: var(--muted);
    padding: 2rem;
    font-size: .95rem;
  }

  .empty-state {
    text-align: center;
    color: var(--muted);
    padding: 3rem 1rem;
    font-size: .95rem;
  }

    header h1 { font-size: 1.5rem; }
    .filters-card { padding: 1rem; gap: .9rem 1.2rem; }
    .chart-card, .examples-card { padding: 1rem; }
  }
</style>
</head>
<body>

<header>
  <h1>Anglicismos en Redes Sociales</h1>
  <p>Análisis del corpus · TFG Lingüística</p>
  <div class="pills-row">
    <div class="pill"><span>602</span> ocurrencias</div>
    <div class="pill"><span>133</span> anglicismos únicos</div>
    <div class="pill"><span>3</span> redes sociales</div>

</header>

<main>

  <div class="filters-card">
    <div class="filter-group">

      <div class="chart-type-group">

        <button data-type="line" title="Líneas">📈 Líneas</button>
        <button data-type="doughnut" title="Porcentual">🥧 %</button>
      </div>
    </div>

    <div class="filter-group">
      <label>Red social</label>
      <select id="platformFilter">
        <option value="">Todas las redes</option>
        <option value="TikTok">TikTok</option>
        <option value="Instagram">Instagram</option>
        <option value="WhatsApp">WhatsApp</option>
      </select>
    </div>

    <div class="filter-group" style="min-width:200px">
      <label>Anglicismo concreto</label>
      <select id="anglicismFilter">
        <option value="">Ver ranking general</option>
      </select>
    </div>
  </div>

  <div class="chart-card">
    <div class="chart-header">
      <div>
        <div class="chart-title" id="chartTitle">Top anglicismos más usados</div>
        <div class="chart-subtitle" id="chartSubtitle">Frecuencia de aparición en el corpus total</div>
      </div>
      <div class="topn-group" id="topNWrapper">
        <label for="topN">Mostrar top</label>
        <select id="topN">
          <option value="10">10</option>
          <option value="15" selected>15</option>
          <option value="20">20</option>
          <option value="30">30</option>
        </select>
      </div>
    </div>
    <div class="chart-wrapper">
      <canvas id="mainChart"></canvas>
    </div>
  </div>

  <div class="examples-card" id="examplesPanel" style="display:none">
    <div class="examples-header">
      <h3>Ejemplos de uso</h3>
      <span class="examples-tag" id="examplesTag"></span>
    </div>
    <div class="examples-grid" id="examplesGrid"></div>
  </div>

</main>

// Normalize anglicismos to lowercase
const DATA = RAW.map(r => ({ p: r.p, a: r.a.toLowerCase().trim(), f: r.f }));

const PLATFORMS = ['TikTok', 'Instagram', 'WhatsApp'];
const PLATFORM_COLORS = {
  'TikTok':    { solid: '#fe2c55', light: 'rgba(254,44,85,0.8)' },
  'Instagram': { solid: '#c13584', light: 'rgba(193,53,132,0.8)' },
  'WhatsApp':  { solid: '#25d366', light: 'rgba(37,211,102,0.8)' },
};
const DEFAULT_COLOR = { solid: '#6366f1', light: 'rgba(99,102,241,0.8)' };
const PALETTE = [
  '#6366f1','#a855f7','#ec4899','#f59e0b','#10b981',
  '#3b82f6','#ef4444','#14b8a6','#f97316','#8b5cf6',
  '#06b6d4','#84cc16','#e11d48','#0ea5e9','#d946ef'
];

// Build anglicismo index
const angCount = {};
DATA.forEach(r => { angCount[r.a] = (angCount[r.a] || 0) + 1; });
const ALL_ANGS = Object.entries(angCount)
  .sort((a,b) => b[1]-a[1])
  .map(e => e[0]);

// Populate anglicismo dropdown
const angSelect = document.getElementById('anglicismFilter');
ALL_ANGS.forEach(ang => {
  const opt = document.createElement('option');
  opt.value = ang;
  opt.textContent = ang + ' (' + angCount[ang] + ')';
  angSelect.appendChild(opt);
});

// ── STATE ──────────────────────────────────────────────────────────────────────
let chartType = 'bar';
let chartInstance = null;

function getFilters() {
  return {
    platform: document.getElementById('platformFilter').value,
    anglicism: document.getElementById('anglicismFilter').value,
    topN: parseInt(document.getElementById('topN').value),
  };
}

// ── CHART LOGIC ────────────────────────────────────────────────────────────────
function computeChartData({ platform, anglicism, topN }) {
  // Case 1: specific anglicism selected → compare across platforms
  if (anglicism) {
    const filtered = DATA.filter(r => r.a === anglicism);
    const counts = {};
    PLATFORMS.forEach(p => { counts[p] = 0; });
    filtered.forEach(r => { if (r.p) counts[r.p] = (counts[r.p] || 0) + 1; });
    if (platform) {
      // single platform + single anglicism → show all examples only
      return null;
    }
    return {
      labels: PLATFORMS,
      datasets: [{
        label: anglicism,
        data: PLATFORMS.map(p => counts[p]),
        backgroundColor: PLATFORMS.map(p => PLATFORM_COLORS[p].light),
        borderColor: PLATFORMS.map(p => PLATFORM_COLORS[p].solid),
        borderWidth: 2,
        borderRadius: 8,
        pointBackgroundColor: PLATFORMS.map(p => PLATFORM_COLORS[p].solid),
        pointRadius: 6,
        fill: false,
        tension: 0.4,
      }],
      title: `«${anglicism}» por red social`,
      subtitle: `Distribución de ${filtered.length} ocurrencias entre las 3 plataformas`,
    };
  }

  // Case 2: ranking mode → filter by platform if set
  const filtered = platform ? DATA.filter(r => r.p === platform) : DATA;
  const counts = {};
  filtered.forEach(r => { counts[r.a] = (counts[r.a] || 0) + 1; });
  const sorted = Object.entries(counts).sort((a,b) => b[1]-a[1]).slice(0, topN);
  const labels = sorted.map(e => e[0]);
  const values = sorted.map(e => e[1]);
  const color = platform ? PLATFORM_COLORS[platform] : DEFAULT_COLOR;

  return {
    labels,
    datasets: [{
      label: 'Ocurrencias',
      data: values,
      backgroundColor: chartType === 'doughnut'
        ? PALETTE.slice(0, labels.length)
        : labels.map((_, i) => PALETTE[i % PALETTE.length].replace(')', ', 0.85)').replace('rgb', 'rgba').replace('#', '')),
      borderColor: chartType === 'doughnut'
        ? PALETTE.slice(0, labels.length)
        : labels.map((_, i) => PALETTE[i % PALETTE.length]),
      borderWidth: 2,
      borderRadius: chartType !== 'doughnut' ? 8 : 0,
      pointBackgroundColor: color.solid,
      pointRadius: 5,
      fill: false,
      tension: 0.4,
    }],
    title: platform
      ? `Top ${topN} anglicismos en ${platform}`
      : `Top ${topN} anglicismos más usados`,
    subtitle: platform
      ? `De un total de ${filtered.length} ocurrencias en ${platform}`
      : `De un total de 602 ocurrencias en todo el corpus`,
  };
}

function renderChart() {
  const filters = getFilters();
  const { platform, anglicism, topN } = filters;

  // Update top-N visibility
  document.getElementById('topNWrapper').style.display = anglicism ? 'none' : 'flex';

  const chartData = computeChartData(filters);

  if (!chartData) {
    // Both filters active: no chart, just examples
    document.getElementById('chartTitle').textContent = `Filtros activos: «${anglicism}» en ${platform}`;
    document.getElementById('chartSubtitle').textContent = 'Selecciona solo un filtro para ver el gráfico';
    if (chartInstance) { chartInstance.destroy(); chartInstance = null; }
    document.querySelector('.chart-wrapper').innerHTML = '<div class="empty-state">Selecciona solo la red social <em>o</em> el anglicismo para ver el gráfico.<br>Con ambos activos, consulta los ejemplos de abajo.</div>';
    renderExamples(filters);
    return;
  }

  document.getElementById('chartTitle').textContent = chartData.title;
  document.getElementById('chartSubtitle').textContent = chartData.subtitle;

  // Ensure canvas exists
  let wrapper = document.querySelector('.chart-wrapper');
  if (!wrapper.querySelector('canvas')) {
    wrapper.innerHTML = '<canvas id="mainChart"></canvas>';
  }
  const ctx = document.getElementById('mainChart').getContext('2d');

  if (chartInstance) chartInstance.destroy();

  const isHorizontal = (chartType === 'bar') && chartData.labels.length > 8;
  const actualType = chartType === 'doughnut' ? 'doughnut' : (isHorizontal ? 'bar' : chartType);

  chartInstance = new Chart(ctx, {
    type: actualType,
    data: { labels: chartData.labels, datasets: chartData.datasets },
    options: {
      indexAxis: isHorizontal ? 'y' : 'x',
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: {
          display: chartType === 'doughnut',
          position: 'right',
          labels: { padding: 12, font: { size: 12 }, boxWidth: 14, boxHeight: 14 }
        },
        tooltip: {
          callbacks: {
            label: ctx => ' ' + ctx.parsed[isHorizontal ? 'x' : 'y'] + ' ocurrencias'
          }
        }
      },
      scales: chartType === 'doughnut' ? {} : {
        x: {
          grid: { color: 'rgba(0,0,0,0.05)' },
          ticks: { font: { size: 11 }, color: '#374151' }
        },
        y: {
          grid: { color: 'rgba(0,0,0,0.05)' },
          ticks: { font: { size: 11 }, color: '#374151' },
          beginAtZero: true
        }
      },
      animation: { duration: 400, easing: 'easeInOutQuart' }
    }
  });

  // Dynamic canvas height
  const n = chartData.labels.length;
  const h = chartType === 'doughnut' ? 340 : isHorizontal ? Math.max(260, n * 30) : 340;
  document.getElementById('mainChart').style.height = h + 'px';

  renderExamples(filters);
}

function renderExamples({ platform, anglicism }) {
  const panel = document.getElementById('examplesPanel');
  if (!anglicism) { panel.style.display = 'none'; return; }

  const filtered = DATA.filter(r =>
    r.a === anglicism && (!platform || r.p === platform)
  );

  panel.style.display = 'block';
  document.getElementById('examplesTag').textContent = anglicism;

  const grid = document.getElementById('examplesGrid');
  if (filtered.length === 0) {
    grid.innerHTML = '<div class="no-examples">No hay ejemplos para esta combinación.</div>';
    return;
  }

  grid.innerHTML = filtered.map(r => `
    <div class="example-item">
      <div class="example-meta">
        <span class="platform-badge badge-${r.p}">${r.p}</span>
      </div>
      <div class="example-phrase">«${r.f}»</div>
    </div>
  `).join('');
}

// ── EVENTS ─────────────────────────────────────────────────────────────────────
document.querySelectorAll('.chart-type-group button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.chart-type-group button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    chartType = btn.dataset.type;
    renderChart();
  });
});

document.getElementById('platformFilter').addEventListener('change', renderChart);
document.getElementById('anglicismFilter').addEventListener('change', renderChart);
document.getElementById('topN').addEventListener('change', renderChart);

// Initial render
renderChart();
</script>
